name: Deploy Sentiment API

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Docker
        run: sudo apt-get install docker.io -y

      - name: Build Docker image
        run: docker build -t sentiment-api .
