name: Deploy Sentiment API

on:
  push:
    branches:
      - main

env:
  IMAGE: ghcr.io/${{ github.repository }}:latest

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image name to lowercase
        run: echo "IMAGE=$(echo $IMAGE | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}


  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m
          script: |
            # Ensure swap exists (prevents OOM freeze on t3.micro)
            if [ ! -f /swapfile ]; then
              sudo fallocate -l 2G /swapfile
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
              echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
            fi
            sudo swapon /swapfile 2>/dev/null || true

            IMAGE="ghcr.io/mirza-abdul-wasay5704/text-sentiment-predictor-aws:latest"

            # Create app directory if it doesn't exist, then cd into it
            mkdir -p ~/app
            cd ~/app

            # Pull latest code (for docker-compose.yml and monitoring configs)
            if [ -d ".git" ]; then
              git pull origin main
            else
              git clone https://github.com/mirza-abdul-wasay5704/Text-Sentiment-Predictor-AWS.git .
            fi

            # Install Docker Compose plugin if not available
            if ! sudo docker compose version &> /dev/null; then
              sudo mkdir -p /usr/local/lib/docker/cli-plugins
              sudo curl -SL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64 -o /usr/local/lib/docker/cli-plugins/docker-compose
              sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
            fi

            # Pull latest app image
            sudo docker pull $IMAGE

            # Stop old containers
            sudo docker compose down || true

            # Start all 3 services — no build needed, image already pulled
            sudo docker compose up -d --no-build