name: Deploy Sentiment API

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/Text-Sentiment-Predictor-AWS
            git pull origin main
            sudo docker build -t sentiment-api .
            sudo docker stop sentiment-api || true
            sudo docker rm sentiment-api || true
            sudo docker run -d --name sentiment-api -p 8000:8000 sentiment-api