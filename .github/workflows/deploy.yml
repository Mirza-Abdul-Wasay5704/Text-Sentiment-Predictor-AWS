name: Deploy Sentiment API

on:
  push:
    branches:
      - main

env:
  IMAGE: ghcr.io/${{ github.repository }}:latest

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image name to lowercase
        run: echo "IMAGE=$(echo $IMAGE | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}


  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            IMAGE="ghcr.io/mirza-abdul-wasay5704/text-sentiment-predictor-aws:latest"

            cd ~/app || mkdir -p ~/app && cd ~/app

            # Pull latest code (for docker-compose.yml and monitoring configs)
            if [ -d ".git" ]; then
              git pull origin main
            else
              git clone https://github.com/mirza-abdul-wasay5704/Text-Sentiment-Predictor-AWS.git .
            fi

            # Pull latest app image
            sudo docker pull $IMAGE

            # Stop old containers
            sudo docker compose down || true

            # Start all 3 services (app + prometheus + grafana)
            sudo docker compose up -d